<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV INDIA</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; text-align: center; }
        header { background-color: #333; color: white; padding: 20px; }
        .content { padding: 20px; }
        .channel-selector select { padding: 10px; width: 300px; font-size: 16px; }
        iframe, video { width: 640px; height: 360px; margin-top: 20px; }
        .hidden-iframe { display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
<header>
    <h1>MSTV INDIA</h1>
    <p>Select a channel to watch.</p>
</header>
<div class="content">
    <select id="channelSelect" onchange="loadChannel()">
        <option value="">Select Channel</option>
        <option value="0">Test m3u8</option>
        <option value="1">Test iframe</option>
    </select>
    <h3 id="channelName">Select a channel</h3>
    <div id="player"></div>
    <div id="iframeContainer" class="hidden-iframe">
        <iframe id="iframePlayer" src="" allowfullscreen></iframe>
    </div>
</div>
<script>
    const channels = {
        "0": { name: "Test m3u8", type: "m3u8", url: "https://ndtvindiaelemarchana.akamaized.net//hls//live//2003679-b//ndtvindia//master.m3u8" },
        "1": { name: "Test iframe", type: "iframe", url: "https://enz.gdplayertv.to/embed/colors-hindi-my/" }
    };

    function loadChannel() {
        const channelId = document.getElementById("channelSelect").value;
        const channel = channels[channelId];

        // Reset the player
        document.getElementById("player").innerHTML = "";
        document.getElementById("iframeContainer").style.display = "none";
        document.getElementById("iframePlayer").src = "";

        if (!channel) {
            document.getElementById("channelName").innerText = "Select a channel";
            return;
        }

        document.getElementById("channelName").innerText = channel.name;

        if (channel.type === "m3u8") {
            const video = document.createElement("video");
            video.id = "video";
            video.controls = true;
            video.autoplay = true;
            document.getElementById("player").appendChild(video);

            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(channel.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.ERROR, (event, data) => {
                    console.error("HLS error:", data);
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channel.url;
                video.addEventListener('error', () => {
                    console.error("Browser cannot play this m3u8 stream.");
                });
            } else {
                console.error("HLS.js is not supported and browser cannot play m3u8.");
            }
        } else if (channel.type === "iframe") {
            document.getElementById("iframeContainer").style.display = "block";
            document.getElementById("iframePlayer").src = channel.url;
        }
    }
</script>
</body>
</html>
