<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>MSTV NETWORK</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Roboto', sans-serif;
            background-color: #111;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .title {
            font-size: 5vw;
            font-weight: bold;
            color: #ff4e00;
            letter-spacing: 2px;
            margin-top: 2vw;
            text-align: center;
        }

        .player-container {
            width: 100%;
            max-width: 1200px;
            height: 50vh;
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 5vw;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
        }

        .channel-selection {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 3vw;
        }

        .channel-selector-text {
            font-size: 3vw;
            color: #ff4e00;
            margin-bottom: 1vw;
        }

        .channel-selection select {
            padding: 2vw;
            font-size: 3vw;
            background-color: #222;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            width: 80%;
            max-width: 300px;
            margin-bottom: 3vw;
        }

        .facebook-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2vw;
        }

        .facebook-icon {
            font-size: 4vw;
            color: #3b5998;
            margin-right: 10px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .facebook-icon:hover {
            color: #1d3557;
        }

        .facebook-text {
            font-size: 2.5vw;
            color: #fff;
        }

        .footer {
            width: 100%;
            background-color: #222;
            padding: 2vw 0;
            position: fixed;
            bottom: 0;
            left: 0;
            text-align: center;
            z-index: 10;
        }

        .footer-buttons {
            display: flex;
            justify-content: center;
            gap: 5vw;
        }

        .footer-btn {
            background-color: #ff4e00;
            border: none;
            color: white;
            padding: 2vw 4vw;
            font-size: 3vw;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .footer-btn:hover {
            background-color: #e04300;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 7vw;
            }

            .facebook-icon {
                font-size: 6vw;
            }

            .facebook-text {
                font-size: 5vw;
            }

            .footer-btn {
                font-size: 4vw;
                padding: 4vw 6vw;
            }

            .channel-selector-text {
                font-size: 4vw;
            }

            .channel-selection select {
                font-size: 5vw;
                padding: 4vw;
                max-width: 80%;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 8vw;
            }

            .facebook-icon {
                font-size: 8vw;
            }

            .facebook-text {
                font-size: 6vw;
            }

            .footer-btn {
                font-size: 5vw;
                padding: 6vw 8vw;
            }

            .channel-selector-text {
                font-size: 5vw;
            }

            .channel-selection select {
                font-size: 6vw;
                padding: 5vw;
                max-width: 90%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title">MSTV NETWORK</div>
        
        <!-- Player Section -->
        <div class="player-container" id="playerContainer">
            <!-- Player will be dynamically loaded here -->
        </div>

        <!-- Channel selection -->
        <div class="channel-selection">
            <div class="channel-selector-text">Select Channel</div>
            <select id="channelSelect" onchange="loadChannel(this.value)">
                <option value="1">Channel 1 (m3u8)</option>
                <option value="2">Channel 2 (YouTube)</option>
                <option value="3">Channel 3 (MP4)</option>
                <option value="4">Channel 4 (Twitch Embed)</option>
                <option value="5">Channel 5 (Iframe Embed)</option>
            </select>
        </div>

        <!-- Facebook Follow Us Section -->
        <div class="facebook-container">
            <a href="https://www.facebook.com/YourPage" target="_blank" class="facebook-icon">
                <i class="fab fa-facebook"></i>
            </a>
            <span class="facebook-text">Follow us on Facebook</span>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-buttons">
            <button class="footer-btn" onclick="window.location.href='privacy-policy.html'">Privacy Policy</button>
            <button class="footer-btn" onclick="window.location.href='disclaimer.html'">Disclaimer</button>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        // Media Sources (m3u8, YouTube, MP4, Twitch, Iframe)
        const channels = {
            1: {
                type: 'm3u8',
                source: "https://mhlive.paramountinfosystem.com/mhoneshraddhatest/d0dbe915091d400bd8ee7f27f0791303.sdp/playlist.m3u8"
            },
            2: {
                type: 'iframe',
                source: "https://www.youtube.com/embed/dQw4w9WgXcQ"  // Example YouTube link
            },
            3: {
                type: 'mp4',
                source: "https://www.w3schools.com/html/movie.mp4" // Example MP4 file
            },
            4: {
                type: 'iframe',
                source: "https://player.twitch.tv/?channel=aiodigital&parent=mstvnetwork.github.io"  // Twitch Embed
            },
            5: {
                type: 'iframe',
                source: "https://enz.gdplayertv.to/embed/colors-"  // Iframe Embed
            }
        };

        // Function to load selected channel
        function loadChannel(channelId) {
            const playerContainer = document.getElementById('playerContainer');
            const channel = channels[channelId];

            // Clear the player container
            playerContainer.innerHTML = '';

            if (channel.type === 'm3u8') {
                // Create HLS player for m3u8 streams
                if (Hls.isSupported()) {
                    var video = document.createElement('video');
                    video.controls = true;
                    playerContainer.appendChild(video);
                    var hls = new Hls();
                    hls.loadSource(channel.source);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function () {
                        video.play();
                    });
                } else {
                    playerContainer.innerHTML = 'Your browser does not support HLS.';
                }
            } else if (channel.type === 'iframe') {
                // Create iframe for YouTube, Twitch or other iframe embeds
                const iframe = document.createElement('iframe');
                iframe.src = channel.source;
                iframe.frameborder = '0';
                iframe.allowfullscreen = true;
                playerContainer.appendChild(iframe);
            } else if (channel.type === 'mp4') {
                // Create MP4 player
                const video = document.createElement('video');
                video.src = channel.source;
                video.controls = true;
                playerContainer.appendChild(video);
                video.play();
            }
        }

        // Initialize with Channel 1 (m3u8)
        loadChannel(1);
    </script>

</body>
</html>
