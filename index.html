<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Player</title>
</head>
<body>
    <h1>Media Player</h1>

    <!-- M3U8 Video Player -->
    <div>
        <h2>Live Stream (M3U8)</h2>
        <video controls width="600">
            <source src="https://livecdn.live247stream.com/joomusic/tv/playlist.m3u8" type="application/x-mpegURL">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- Iframe Embed -->
    <div>
        <h2>Embedded Player (Iframe)</h2>
        <iframe src="https://enz.gdplayertv.to/embed/colors-hindi-my/" width="600" height="400" frameborder="0" allowfullscreen></iframe>
    </div>

    <!-- MP4 Video Player -->
    <div>
        <h2>MP4 Video</h2>
        <video controls width="600">
            <source src="https://s3.krakenfiles.com/video/uploads/31-12-2024/KkRTzsZVxt/file.mp4?md5=dcLIGjFn2qcKzLsI0g4Kxg&expires=1735790872" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

</body>
</html>
