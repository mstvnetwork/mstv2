<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Your Website Title</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 1));
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center; /* Horizontally center the content */
            min-height: 100vh;
            text-align: center;
        }

        /* Header */
        header {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            width: 100%; /* Full width */
        }

        header h1 {
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            color: #e50914; /* Netflix Red */
        }

        header .copyright {
            font-size: 1rem;
            margin-top: 10px;
            color: #ccc;
        }

        /* Buttons Container */
        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 600px; /* Limit the width for better display on wide screens */
        }

        .button {
            background-color: #e50914;
            color: white;
            padding: 12px 20px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
            min-width: 120px;
            max-width: 200px;
            text-align: center;
        }

        .button:hover {
            background-color: #f44336;
        }

        /* Media Player Section */
        .media-player {
            padding: 20px;
            text-align: center;
            max-width: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .media-player iframe {
            width: 100%;
            max-width: 800px;
            height: 450px;
            border: none;
            border-radius: 8px;
        }

        /* Channel Selector */
        .channel-selector {
            text-align: center;
            margin: 20px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .channel-selector select {
            padding: 10px;
            font-size: 1.1rem;
            border: none;
            background-color: #333;
            color: #fff;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .channel-selector select:hover {
            background-color: #e50914;
        }

        /* Footer Section */
        footer {
            background-color: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 20px;
            text-align: center;
            width: 100%;
        }

        .follow-us {
            margin-bottom: 20px;
        }

        .facebook-link {
            color: #fff;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            font-size: 1rem;
        }

        .facebook-icon {
            width: 24px;
            height: 24px;
            margin-right: 10px;
        }

        .scrolling-logos {
            overflow: hidden;
            white-space: nowrap;
            position: relative;
        }

        .logos {
            display: inline-flex;
            animation: scroll 10s linear infinite;
        }

        .logos img {
            height: 50px;
            margin: 0 10px;
        }

        @keyframes scroll {
            0% {
                transform: translateX(100%);
            }
            100% {
                transform: translateX(-100%);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            header .copyright {
                font-size: 0.9rem;
            }

            .button {
                font-size: 0.9rem;
                padding: 10px 18px;
                min-width: 100px;
            }

            .media-player iframe {
                height: 250px;
            }

            .channel-selector select {
                font-size: 1rem;
            }

            .facebook-link {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.5rem;
            }

            header .copyright {
                font-size: 0.8rem;
            }

            .button {
                font-size: 0.8rem;
                padding: 8px 16px;
                min-width: 80px;
            }

            .media-player iframe {
                height: 200px;
            }

            .channel-selector select {
                font-size: 0.9rem;
            }

            .facebook-link {
                font-size: 0.8rem;
            }

            .logos img {
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Your Website Title</h1>
        <p class="copyright">© 2025 Your Website</p>
    </header>

    <div class="buttons-container">
        <button class="button" onclick="showInfo('about-us')">About Us</button>
        <button class="button" onclick="showInfo('disclaimer')">Disclaimer</button>
        <button class="button" onclick="showInfo('privacy-policy')">Privacy Policy</button>
        <button class="button" onclick="showInfo('contact-us')">Contact Us</button>
    </div>

    <div class="media-player">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
    </div>

    <div class="channel-selector">
        <label for="channels">Select Channels Here:</label>
        <select id="channels">
            <option value="channel1">Channel 1</option>
            <option value="channel2">Channel 2</option>
            <option value="channel3">Channel 3</option>
        </select>
    </div>

    <div id="info-container" style="margin: 20px; padding: 20px; background-color: #333; border-radius: 5px; color: white;">
        <h2 id="info-title"></h2>
        <p id="info-content"></p>
    </div>

    <footer>
        <div class="follow-us">
            <a href="https://www.facebook.com" target="_blank" class="facebook-link">
                <img src="facebook-icon.png" alt="Facebook Icon" class="facebook-icon">
                Follow us on Facebook
            </a>
        </div>

        <div class="scrolling-logos">
            <div class="logos">
                <img src="logo1.png" alt="Logo 1">
                <img src="logo2.png" alt="Logo 2">
                <img src="logo3.png" alt="Logo 3">
                <img src="logo4.png" alt="Logo 4">
            </div>
        </div>
    </footer>

    <script>
        function showInfo(type) {
            var title = document.getElementById('info-title');
            var content = document.getElementById('info-content');

            switch (type) {
                case 'about-us':
                    title.innerText = 'About Us';
                    content.innerText = 'We are a leading website providing the best content for users.';
                    break;
                case 'disclaimer':
                    title.innerText = 'Disclaimer';
                    content.innerText = 'The content provided is for informational purposes only.';
                    break;
                case 'privacy-policy':
                    title.innerText = 'Privacy Policy';
                    content.innerText = 'We value your privacy and protect your personal information.';
                    break;
                case 'contact-us':
                    title.innerText = 'Contact Us';
                    content.innerText = 'Feel free to reach out to us at support@yourwebsite.com.';
                    break;
                default:
                    title.innerText = '';
                    content.innerText = '';
            }
        }
    </script>
</body>
</html>
