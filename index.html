<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV INDIA</title>
    <style>
        /* Your existing styles go here */
        .channel-selector img {
            width: 30px;
            height: 30px;
            margin-right: 10px;
        }

        @media (max-width: 768px) {
            iframe, video {
                height: 250px;
            }

            .channel-selector select {
                width: 90%;
            }
        }

        /* Style to hide iframe by default */
        .hidden-iframe {
            display: none;
        }

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<header>
    <h1>MSTV INDIA</h1>
    <p class="slogan">PLEASE FOLLOW THE INSTRUCTIONS BELOW</p>
    <p class="slogan">PLEASE SELECT CHANNEL, WAIT FOR CHANNEL TO LOAD</p>
    <p class="slogan">REFRESH THE WEBPAGE COUPLE OF TIMES TO WATCH NEWLY ADDED CHANNELS</p>
    <p>&copy; 2025 MSTV INDIA</p>
</header>

<div class="content">
    <h2></h2>
    <div class="channel-selector">
        <img src="https://raw.githubusercontent.com/mstvnetwork/mstv/main/remote.png" alt="Channel Icon">
        <select id="channelSelect" onchange="loadChannel()">
            <option value="">Select Channel</option>
            <!-- Channel options will be dynamically updated by SSE -->
        </select>
    </div>

    <div id="videoPlayerContainer" class="m3u8-player">
        <h3 id="channelName">Select a channel</h3>
        <div id="player"></div>
    </div>

    <div id="iframeContainer" class="hidden-iframe">
        <iframe id="iframePlayer" width="640" height="320" scrolling="no" frameborder="0" loading="lazy" allowfullscreen></iframe>
    </div>
</div>

<div class="footer">
    <p></p>
</div>

    let iframePlayer = document.getElementById('iframePlayer');
    let hlsInstance = null;

    function loadChannel() {
        const channelId = document.getElementById('channelSelect').value;
        const channel = channels[channelId];

        if (!channel) {
            document.getElementById('channelName').innerText = 'Select a channel';
            document.getElementById('player').innerHTML = '';
            document.getElementById('iframeContainer').style.display = 'none';
            return;
        }

        stopIframeVideo();
        document.getElementById('iframeContainer').style.display = 'none';
        document.getElementById('channelName').innerText = channel.name;
        document.getElementById('player').innerHTML = '';

        if (channel.type === "m3u8") {
            document.getElementById('player').innerHTML = `<video id="video" controls></video>`;
            const video = document.getElementById('video');

            if (Hls.isSupported()) {
                hlsInstance = new Hls();
                hlsInstance.loadSource(channel.url);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channel.url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        } else if (channel.type === "iframe") {
            document.getElementById('iframeContainer').style.display = 'block';
            iframePlayer.src = channel.url;
        }
    }

    function stopIframeVideo() {
        iframePlayer.src = '';
    }

    // SSE for real-time updates
    const eventSource = new EventSource('/server/updates'); // Adjust server URL

    eventSource.onmessage = function(event) {
        const updatedChannels = JSON.parse(event.data);
        updateChannelOptions(updatedChannels);
    };

    function updateChannelOptions(updatedChannels) {
        const selectElement = document.getElementById('channelSelect');
        selectElement.innerHTML = '<option value="">Select Channel</option>'; // Clear existing options

        // Add updated channels to the dropdown
        for (const [key, channel] of Object.entries(updatedChannels)) {
            const option = document.createElement('option');
            option.value = key;
            option.textContent = `${channel.name} (${channel.type})`;
            selectElement.appendChild(option);
        }
    }
</script>

</body>
</html>
