<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>MSTV INDIA</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #FF0000;
            color: Blue;
            padding: 20px;
            border-bottom: 5px solid #333;
        }
        h1 {
            font-size: 4em;
            font-family: 'Arial Black', sans-serif;
            color: #FFD700;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
            margin: 0;
        }
        .slogan {
            color: skyblue;
            font-size: 1.2em;
            margin-top: 5px;
            font-weight: 600;
        }
        .content {
            margin: 20px;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        iframe, video {
            width: 100%;
            max-width: 600px;  
            height: 400px;
            border: none;
            margin: 20px auto;
        }
        .footer {
            background-color: #333;
            color: white;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
        .m3u8-player {
            margin-top: 20px;
        }
        select {
            padding: 10px;
            font-size: 1.2em;
            margin: 10px;
            width: 80%;
            border-radius: 5px;
            border: 2px solid #ccc;
        }
        .channel-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 15px;
        }
        .channel-selector img {
            width: 30px;
            height: 30px;
            margin-right: 10px;
        }
        @media (max-width: 768px) {
            iframe, video {
                height: 250px;
            }
            .channel-selector select {
                width: 90%;
            }
        }

        /* Style to hide iframe by default */
        .hidden-iframe {
            display: none;
        }
    </style>
    <!-- Include hls.js for M3U8 support -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<header>
    <h1>MSTV INDIA</h1>
    <p class="slogan">ADDING MORE CHANNELS TODAY, PLEASE REFRESH THE WEBPAGE TO SEE NEWLY ADDED CHANNELS.</p>
    <p>&copy; 2024 MSTV INDIA</p>
</header>

<div class="content">
    <h2></h2>
    
    <!-- Channel Selection with Icon -->
    <div class="channel-selector">
        <!-- Example channel icon -->
        <img src="https://raw.githubusercontent.com/mstvnetwork/mstv/main/remote.png">
        <select id="channelSelect" onchange="loadChannel()">
            <option value="">Select Channel</option>
            <!-- List of Channel Options -->
            <option value="**">**. SELECT SPORT CHANNELS</option> 
            <option value="1">1. TNT SPORT</option>
            <option value="2">2. PTV SPORT</option>
            <option value="3">3. CRICKET GOLD</option>
            <option value="4">4. SPORTS 18 CHANNEL</option>
            <option value="5">5. STAR SPORTS 1</option>
            <option value="6">6. SONY TEN 1</option>
            <option value="7">7. STAR SPORTS 3</option>
        </select>
    </div>

    <!-- Video Player Container -->
    <div id="videoPlayerContainer" class="m3u8-player">
        <h3 id="channelName">Select a channel</h3>
        <div id="player"></div>
    </div>

    <!-- Hidden iframe (it will not affect appearance unless activated) -->
    <div id="iframeContainer" class="hidden-iframe">
        <iframe id="iframePlayer" src="" width="640" height="320" scrolling="no" frameborder="0" loading="lazy" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; fullscreen; geolocation; web-share; speaker-selection; screen-wake-lock; idle-detection" allowfullscreen></iframe>
        <div id="twitchContainer1" class="hidden-iframe">
            <iframe id="twitchPlayer1" src="https://player.twitch.tv/?channel=aiodigital&parent=mstvindia.github.io" height="480" width="854" frameborder="0" scrolling="no" allowfullscreen></iframe>
        </div>
        <div id="twitchContainer2" class="hidden-iframe">
            <iframe id="twitchPlayer2" src="https://player.twitch.tv/?channel=mstvtwo&parent=mstvindia.github.io" height="480" width="854" frameborder="0" scrolling="no" allowfullscreen></iframe>
        </div>
    </div>
</div>

<div class="footer">
    <p></p>
</div>

<script>
    const channels = {
        "1": {
            name: "TNT SPORTS 1",
            type: "m3u8",
            url: "https://d35j504z0x2vu2.cloudfront.net/v1/master/0bc8e8376bd8417a1b6761138aa41c26c7309312/punjabi-hits/master.m3u8"
        },
        "2": {
            name: "PTV SPORTS",
            type: "iframe",
            url: "https://stream.crichd.sc/update/ptv.php"
        },
        "3": {
            name: "CRICKET GOLD",
            type: "m3u8",
            url: "https://api-ott-zee-zb.ottera.tv/loggingmediaurlpassthrough/a.m3u8?ads.dpname=distrotv&version=12&id=10&partner=distro&ads.rnd=ohzm&ads.env_i=8a515d3c-8b62-48f2-ad42-8dfe58ea5492&ads.env_u=22db993f-234d-4370-83e2-c0139011297a&ads.name=DistroTV&ads.bundle=undefined&ads.storeurl=undefined&ads.appCategory=entertainment&ads.app_version=202105131041&ads.width=349&ads.height=196&ads.deviceId=22db993f-234d-4370-83e2-c0139011297a&ads.deviceDNT=0&ads.gdpr=0&ads.us_privacy=0&ads.aid=22db993f-234d-4370-83e2-c0139011297a&ads.deviceMake=Web&ads.deviceIdType=cookie&ads.deviceConnectionType=2&ads.deviceCategory=_DEVICE_CATEGORY&ads.client_ip=120.19.162.252&ads.geo=AU&ads.lat=-37.81590&ads.long=144.96690&ads.dma=false&ads.geoType=2&ads.contentid=22882&ads.content_duration=18000&ads.episode_id=126290&ads.show_id=5065&ads.showCategories=IAB1&ads.episodeCategories=IAB1&ads.genre=Entertainment%2CBollywood%2CClassic%20Movies%2CAsian&ads.showRating=TV-14&ads.episodeRating=TV-14&ads.language=hi&ads.showtitle=Zee%20BollyWorld&ads.episodetitle=Zee%20BollyWorld&ads.keywords=Zee%2CBollyWorld%2CBollywood%2CClassic&ads.contenturl=https%3A%2F%2Fwww.distro.tv%2Flive%2Fzee-bollyworld%2F&ads.gdprConsent=GDPR_CONSENT_&ads.paln=&ads.islive=1&ads.streamtype=live&ads.vf=20241219"
        },
        "4": {
            name: "SPORTS 18 CHANNEL",
            type: "m3u8",
            url: "https://d35j504z0x2vu2.cloudfront.net/v1/master/0bc8e8376bd8417a1b6761138aa41c26c7309312/pitaara-tv/playlist.m3u8"
        },
        "5": {
            name: "STAR SPORTS 1",
            type: "iframe",
            url: "https://stream.crichd.sc/update/star.php"
        },
        "6": {
            name: "SONY TEN 1(Please wait for channel to load)",
            type: "iframe",
            url: "https://stream.crichd.sc/update/ten1.php"
        },
        "7": {
            name: "STAR SPORTS 3 (Please wait for channel to load)",
            type: "iframe",
            url: "https://stream.crichd.sc/update/star1hi.php"
        }
    };

    let iframePlayer = document.getElementById('iframePlayer');
    let hlsInstance = null;

    function loadChannel() {
        const channelId = document.getElementById('channelSelect').value;
        const channel = channels[channelId];

        if (!channel) {
            document.getElementById('channelName').innerText = 'Select a channel';
            document.getElementById('player').innerHTML = '';
            document.getElementById('iframeContainer').style.display = 'none'; // Hide iframe container
            return;
        }

        // Clear previous iframe content
        stopIframeVideo();

        // Hide iframe container if channel is not iframe-based
        document.getElementById('iframeContainer').style.display = 'none';
        document.getElementById('channelName').innerText = channel.name;

        // Clear previous player content
        document.getElementById('player').innerHTML = '';

        if (channel.type === "m3u8") {
            document.getElementById('player').innerHTML = `<video id="video" controls></video>`;
            const video = document.getElementById('video');
            
            // Initialize HLS.js for M3U8 video
            if (Hls.isSupported()) {
                hlsInstance = new Hls();
                hlsInstance.loadSource(channel.url);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channel.url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        } else if (channel.type === "iframe") {
            document.getElementById('iframeContainer').style.display = 'block';
            document.getElementById('player').innerHTML = ''; // Clear the previous video player
            iframePlayer.src = channel.url; // Set the iframe source URL
        }
    }

    function stopIframeVideo() {
        iframePlayer.src = ''; // Stop the iframe content
    }

    // JavaScript to check for updates and refresh
    setInterval(function() {
        fetch(location.href)
            .then(response => response.text())
            .then(html => {
                const currentContent = document.body.innerHTML;  // Current HTML content
                const newContent = html;  // Fetched HTML content

                if (currentContent !== newContent) {
                    document.getElementById("updateMessage").textContent = "New updates detected! Refreshing...";
                    location.reload();  // Refresh the page
                }
            })
            .catch(err => {
                console.log('Error checking for updates:', err);
            });
    }, 300000); // Check for updates every 5 minutes
</script>
</body>
</html>
