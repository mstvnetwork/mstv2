<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>MSTV NETWORK</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        /* Image Grid Styling */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));  /* Grid with flexible columns */
            gap: 10px;  /* Space between images */
            margin-bottom: 20px; /* Space below grid */
        }

        .image-grid img {
            width: 100%;    /* Make image fill the grid cell */
            height: auto;   /* Maintain aspect ratio */
            max-width: 200px;  /* Set max width */
            display: block;  /* Prevent any extra space below the image */
            margin: 0 auto;  /* Center the image */
        }

        /* MSTV NETWORK Title styling */
        .title {
            font-size: 30px;
            font-weight: bold;
            color: #e50914;  /* Netflix red color */
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 10px; /* Space above the title */
            text-align: center;
        }

        /* Other styles... */
    </style>
</head>
<body>

    <div class="title">MSTV NETWORK</div>
    <div class="copyright">&copy; 2025 MSTV Network. All rights reserved.</div>

    <!-- Image Grid Section -->
    <div class="image-grid">
        <img src="https://github.com/your-username/your-repository-name/blob/main/images/myimage.jpg?raw=true" alt="Uploaded Image">
        <!-- Add more images if needed -->
    </div>

    <!-- Media Player Section -->
    <div class="container">
        <div class="channel-name"></div>
        <div class="player-container" id="player-container">
            <iframe id="media-player" src="https://player.twitch.tv/?channel=aiodigital&parent=mstvnetwork.github.io" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" sandbox="allow-scripts allow-same-origin" allowfullscreen></iframe>
        </div>
        <div class="url-buttons">
            <button onclick="loadPlayer('https://player.twitch.tv/?channel=aiodigital&parent=mstvnetwork.github.io')">MSTV INDIA CHANNEL 1</button>
        </div>
    </div>

    <script>
        // Function to load the appropriate media player source
        function loadPlayer(url) {
            var iframe = document.getElementById('media-player');
            var playerContainer = document.getElementById('player-container');
            iframe.src = '';
            setTimeout(function() {
                iframe.src = url;
            }, 500);  // Slight delay to ensure iframe reloads properly
        }
    </script>

</body>
</html>
