    <script>
        function changeChannel() {
            const select = document.getElementById("channel-select");
            const url = select.value.trim();
            const type = select.options[select.selectedIndex].getAttribute("data-type");

            const videoPlayer = document.getElementById("media-player");
            const iframePlayer = document.getElementById("iframe-player");

            // Hide both players initially
            videoPlayer.style.display = "none";
            iframePlayer.style.display = "none";

            // Stop iframe from playing by resetting its source
            iframePlayer.src = "";

            // Clear any previous HLS instance
            if (window.hlsInstance) {
                window.hlsInstance.destroy();
            }

            // Check the URL type
            if (url.endsWith(".m3u8") || (!type && url.includes(".m3u8"))) {
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(videoPlayer);
                    window.hlsInstance = hls;
                } else if (videoPlayer.canPlayType("application/vnd.apple.mpegurl")) {
                    videoPlayer.src = url;
                } else {
                    alert("Your browser does not support HLS playback.");
                }
                videoPlayer.style.display = "block";
            } else if (type === "iframe") {
                iframePlayer.src = url;
                iframePlayer.style.display = "block";
            } else if (type === "youtube") {
                iframePlayer.src = url;
                iframePlayer.style.display = "block";
            } else {
                alert("Unsupported channel type.");
            }
        }

        document.addEventListener("DOMContentLoaded", changeChannel);
    </script>
