<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stylish Media Viewer</title>
    <style>
        /* Example styles.css */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #333, #777);
            overflow: hidden; /* Prevent scrolling */
            display: flex;
            justify-content: center; /* Horizontally center the content */
            align-items: center; /* Vertically center the content */
            height: 100vh; /* Full height */
        }

        .container {
            width: 1200px; /* Set a fixed width */
            padding: 20px;
            box-sizing: border-box;
        }

        .page-title {
            text-align: center;
            font-size: 3em;
            color: white;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .media-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            justify-items: center;
        }

        iframe, video, .twitch-embed {
            width: 100%;
            max-width: 100%;
            height: 300px;
            border: none;
            border-radius: 8px;
        }

        /* Disable resizing for smaller screens */
        @media (max-width: 1200px) {
            .media-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="page-title">Stylish Media Viewer</h1>

        <div class="media-container">
            <!-- Dynamically load media content using JavaScript -->
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const mediaUrls = [
                { type: 'youtube', url: 'https://www.youtube.com/embed/dQw4w9WgXcQ' },
                { type: 'mp4', url: 'path/to/video.mp4' },
                { type: 'm3u8', url: 'https://path/to/playlist.m3u8' },
                { type: 'twitch', url: 'https://player.twitch.tv/?channel=aiodigital&parent=mstvnetwork.github.io' },
                // Add more media URLs here as needed
            ];

            const mediaContainer = document.querySelector('.media-container');

            mediaUrls.forEach(media => {
                let mediaElement;
                if (media.type === 'youtube') {
                    mediaElement = `<iframe src="${media.url}" allowfullscreen></iframe>`;
                } else if (media.type === 'mp4') {
                    mediaElement = `<video controls><source src="${media.url}" type="video/mp4"></video>`;
                } else if (media.type === 'm3u8') {
                    mediaElement = `<video controls>
                                        <source src="${media.url}" type="application/x-mpegURL">
                                     </video>`;
                } else if (media.type === 'twitch') {
                    mediaElement = `<iframe class="twitch-embed" src="${media.url}" frameborder="0" allowfullscreen></iframe>`;
                }

                mediaContainer.innerHTML += mediaElement;
            });
        });
    </script>
</body>
</html>
