<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>MSTV NETWORK</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #111;
        }
        /* MSTV NETWORK Title styling */
        .title {
            font-size: 48px;
            font-weight: bold;
            color: #e50914;  /* Netflix red color */
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 30px;
            text-align: center;
        }
        /* Copyright statement styling */
        .copyright {
            font-size: 14px;
            color: #888;
            text-align: center;
            margin-top: 10px;
            letter-spacing: 1px;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .player-container {
            width: 100%;
            max-width: 1200px;
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .url-buttons {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        .url-buttons button {
            background-color: #e50914;
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .url-buttons button:hover {
            background-color: #b20710;
        }
        /* Prevent links from opening in new tabs or redirecting */
        .url-buttons button:focus {
            outline: none;
        }
        /* Responsive Design */
        @media screen and (max-width: 768px) {
            .player-container {
                height: 50vh;
            }
            .url-buttons button {
                width: 100%;
            }
        }
        @media screen and (max-width: 480px) {
            .player-container {
                height: 40vh;
            }
        }
    </style>
</head>
<body>

    <!-- MSTV NETWORK Title -->
    <div class="title">MSTV NETWORK</div>

    <!-- Copyright Statement -->
    <div class="copyright">&copy; 2025 MSTV Network. All rights reserved.</div>

    <div class="container">
        <div class="player-container" id="player-container">
            <iframe id="media-player" src="" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

        <div class="url-buttons">
            <button onclick="loadPlayer('https://web-ndtv24x7-us.akamaized.net/hls/live/2109282/ndtv24x7us/master.m3u8')">NDTV Live (m3u8)</button>
            <button onclick="loadPlayer('https://www.youtube.com/embed/ow77NqggH-0?si=IiZDK3DgGdZIS5Tz')">YouTube Video</button>
            <button onclick="loadPlayer('https://enz.gdplayertv.to/embed/colors-hindi-my/')">Colors TV (Embed)</button>
            <!-- Added Twitch Stream Embed URL -->
            <button onclick="loadPlayer('https://player.twitch.tv/?channel=aiodigital&parent=mstvnetwork.github.io')">Twitch Stream</button>
        </div>
    </div>

    <script>
        // Function to load the appropriate media player source
        function loadPlayer(url) {
            var iframe = document.getElementById('media-player');
            var playerContainer = document.getElementById('player-container');

            // Close the current player if switching URL
            iframe.src = '';

            setTimeout(function() {
                iframe.src = url;
            }, 500);  // Slight delay to ensure iframe reloads properly
        }
    </script>

</body>
</html>
