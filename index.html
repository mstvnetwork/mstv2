<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <h1>Live Stream</h1>
    <video id="video" width="100%" controls></video>

    <script>
        var video = document.getElementById('video');
        var videoUrl = 'http://125.209.88.166:45793/BRN/ArySports.stream/playlist.m3u8';
        
        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoUrl);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                video.play();
                console.log("HLS Manifest parsed successfully.");
            });

            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) {
                    switch (data.fatal) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            console.error("Network error: Could not fetch the stream. Please check the stream URL or network.");
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            console.error("Media error: There was an issue loading the video media.");
                            break;
                        case Hls.ErrorTypes.OTHER_ERROR:
                            console.error("Unknown error occurred while loading the stream.");
                            break;
                        default:
                            console.error("An unexpected error occurred.");
                    }
                }
            });

            hls.on(Hls.Events.LEVEL_LOAD_ERROR, function(event, data) {
                console.error("Error while loading level: ", data);
            });

            hls.on(Hls.Events.LEVEL_SWITCHED, function(event, data) {
                console.log("Switched to level: " + data.level);
            });

        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoUrl;
            video.addEventListener('loadedmetadata', function () {
                video.play();
                console.log("Video is playing natively in a browser that supports HLS (e.g., Safari).");
            });
        } else {
            console.error("Your browser does not support HLS streams.");
        }
    </script>
</body>
</html>
