<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>MSTV NETWORK</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #111;
            overflow-x: hidden;
        }

        .title {
            font-size: 30px;
            font-weight: bold;
            color: #e50914;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 10px;
            text-align: center;
        }

        .container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            margin: 20px 0;
        }

        .channel-selector-text {
            font-size: 18px;
            color: yellow;
            text-align: center;
            margin-bottom: 5px;
        }

        .channel-selector-subtext {
            font-size: 16px;
            color: yellow;
            text-align: center;
            margin-top: 5px;
        }

        .arrow-icon {
            font-size: 24px;
            color: #e50914;
            text-align: center;
            margin-bottom: 20px;
            animation: moveUpDown 0.5s infinite;
        }

        @keyframes moveUpDown {
            0% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
            100% {
                transform: translateY(0);
            }
        }

        /* Custom Dropdown */
        .channel-selection {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .dropdown-btn {
            background-color: #333;
            color: white;
            padding: 8px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 250px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-align: left;
        }

        .dropdown-btn img {
            height: 20px;
            width: 20px;
            margin-right: 10px;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #333;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            z-index: 1;
            width: 100%;
            border-radius: 5px;
        }

        .dropdown-content div {
            padding: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .dropdown-content div:hover {
            background-color: #575757;
        }

        .dropdown-content div img {
            height: 20px;
            width: 20px;
            margin-right: 10px;
        }

        .dropdown-btn:hover + .dropdown-content,
        .dropdown-content:hover {
            display: block;
        }

        /* Player Container */
        .player-container {
            width: 100%;
            max-width: 1200px;
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Image styling */
        .image-container {
            width: 100%;
            text-align: center;
            margin-top: 30px;
            margin-bottom: 30px;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="title">MSTV NETWORK</div>

<div class="container">
    <div class="channel-selector-text">
        Select channels below
    </div>
    <div class="channel-selector-subtext">
        Please wait for the channel to play itself
    </div>

    <div class="arrow-icon">
        <i class="fas fa-arrow-down"></i>
    </div>

    <!-- Custom Dropdown for Channels -->
    <div class="channel-selection">
        <div class="dropdown-btn" onclick="toggleDropdown()">
            <img src="https://via.placeholder.com/20" alt="Logo" id="channel-logo">
            Select Channel
            <i class="fas fa-chevron-down"></i>
        </div>
        <div class="dropdown-content" id="dropdown-content">
            <div onclick="changeChannel('https://player.twitch.tv/?channel=aiodigital&parent=mstvnetwork.github.io', 'https://via.placeholder.com/20?text=MSTV1')">
                <img src="https://via.placeholder.com/20?text=MSTV1" alt="MSTV India Channel">
                MSTV INDIA CHANNEL 1
            </div>
            <div onclick="changeChannel('https://desiplaylive.akamaized.net/ptnr-yupptv/v1/manifest/611d79b11b77e2f571934fd80ca1413453772ac7/vglive-sk-660691/4cf68f50-0c5e-47a6-96e3-b78797a2b6fe/1.m3u8', 'https://via.placeholder.com/20?text=MSTV2')">
                <img src="https://via.placeholder.com/20?text=MSTV2" alt="Desi Play TV">
                MSTV DESI PLAY TV
            </div>
            <div onclick="changeChannel('https://streams2.sofast.tv/ptnr-yupptv/title-Comedy_Tadka_YUPPTV/v1/manifest/611d79b11b77e2f571934fd80ca1413453772ac7/0abe00bb-b6f3-4dcd-bdf6-12e74e08216c/20999fc0-ec94-429e-8f94-f137bb6eef04/0.m3u8', 'https://via.placeholder.com/20?text=MSTV3')">
                <img src="https://via.placeholder.com/20?text=MSTV3" alt="Comedy Tadka">
                COMEDY TADKA
            </div>
            <!-- Add more options here with logos -->
        </div>
    </div>

    <!-- Image insertion -->
    <div class="image-container">
        <img src="https://github.com/username/repository/raw/main/Design-Studio-2025-01-09.png" alt="Design Studio Image">
    </div>

    <div class="player-container" id="player-container">
        <iframe id="media-player" src="https://player.twitch.tv/?channel=aiodigital&parent=mstvnetwork.github.io" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" sandbox="allow-scripts allow-same-origin" allowfullscreen></iframe>
    </div>
</div>

<script>
    function toggleDropdown() {
        const dropdownContent = document.getElementById('dropdown-content');
        dropdownContent.style.display = dropdownContent.style.display === 'block' ? 'none' : 'block';
    }

    function changeChannel(url, logoUrl) {
        const iframe = document.getElementById('media-player');
        iframe.src = '';
        setTimeout(() => {
            iframe.src = url;
        }, 500);

        // Change the logo in the dropdown button
        document.getElementById('channel-logo').src = logoUrl;
        document.getElementById('dropdown-content').style.display = 'none';
    }
</script>

</body>
</html>
