<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Player</title>
    <!-- Include HLS.js for M3U8 streaming -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <h1>Media Player</h1>

    <!-- Channel Selection -->
    <div>
        <h2>Select Channel</h2>
        <select id="channelSelect">
            <option value="channel1">Channel 1</option>
            <option value="channel3">Channel 3</option>
            <option value="channel7">Channel 7</option>
            <option value="channel4">Channel 4</option>
        </select>
    </div>

    <!-- M3U8 Video Player (Channel 1) -->
    <div id="channel1" class="channel-content" style="display: none;">
        <h2>Live Stream (Channel 1 - M3U8)</h2>
        <video id="video1" controls width="600">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- Iframe Player (Channel 3) -->
    <div id="channel3" class="channel-content" style="display: none;">
        <h2>Embedded Player (Channel 3 - Iframe)</h2>
        <iframe src="https://enz.gdplayertv.to/embed/colors-hindi-my/" width="600" height="400" frameborder="0" allowfullscreen></iframe>
    </div>

    <!-- MP4 Video Player (Channel 7) -->
    <div id="channel7" class="channel-content" style="display: none;">
        <h2>MP4 Video (Channel 7)</h2>
        <video id="video7" controls width="600">
            <source src="https://s3.krakenfiles.com/video/uploads/31-12-2024/KkRTzsZVxt/file.mp4?md5=dcLIGjFn2qcKzLsI0g4Kxg&expires=1735790872" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- M3U8 Video Player (Channel 4) -->
    <div id="channel4" class="channel-content" style="display: none;">
        <h2>Live Stream (Channel 4 - M3U8)</h2>
        <video id="video4" controls width="600">
            Your browser does not support the video tag.
        </video>
    </div>

    <script>
        // Function to display the selected channel
        document.getElementById('channelSelect').addEventListener('change', function() {
            var selectedChannel = this.value;
            var channels = document.querySelectorAll('.channel-content');
            
            // Hide all channels first
            channels.forEach(function(channel) {
                channel.style.display = 'none';
            });

            // Show the selected channel
            document.getElementById(selectedChannel).style.display = 'block';

            // Handle M3U8 playback (Channel 1) with HLS.js
            if (selectedChannel === "channel1") {
                var video = document.getElementById('video1');
                if (Hls.isSupported()) {
                    var hls = new Hls();
                    hls.loadSource('https://livecdn.live247stream.com/joomusic/tv/playlist.m3u8');
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play();
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // Fallback for Safari, which natively supports HLS
                    video.src = 'https://livecdn.live247stream.com/joomusic/tv/playlist.m3u8';
                    video.play();
                }
            }

            // Handle M3U8 playback (Channel 4) with HLS.js
            if (selectedChannel === "channel4") {
                var video = document.getElementById('video4');
                if (Hls.isSupported()) {
                    var hls = new Hls();
                    hls.loadSource('https://desiplaylive.akamaized.net/ptnr-yupptv/v1/manifest/611d79b11b77e2f571934fd80ca1413453772ac7/vglive-sk-660691/4cf68f50-0c5e-47a6-96e3-b78797a2b6fe/1.m3u8');
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play();
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // Fallback for Safari, which natively supports HLS
                    video.src = 'https://desiplaylive.akamaized.net/ptnr-yupptv/v1/manifest/611d79b11b77e2f571934fd80ca1413453772ac7/vglive-sk-660691/4cf68f50-0c5e-47a6-96e3-b78797a2b6fe/1.m3u8';
                    video.play();
                }
            }
        });

        // Show default channel (Channel 1) when the page loads
        document.getElementById('channel1').style.display = 'block';
        document.getElementById('video1').src = '';  // Clear any default source for Channel 1
    </script>
</body>
</html>
