<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>MSTV NETWORK</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        /* MSTV NETWORK Title styling */
        .title {
            font-size: 30px;
            font-weight: bold;
            color: #e50914;  /* Netflix red color */
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 10px; /* Space above the title */
            text-align: center;
        }

        /* Image Grid Styling */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); /* Flexible grid with adjustable column size */
            gap: 10px;  /* Space between images */
            margin: 20px 0; /* Space around the grid */
            width: 100%;  /* Ensure it fills the width */
        }

        /* Image Resizing within Grid */
        .image-grid img {
            width: 100%;    /* Make the image fill its grid cell */
            height: auto;   /* Maintain aspect ratio */
            max-width: 150px;  /* Set a maximum width for the image */
            display: block;  /* Ensures no extra space below the image */
            margin: 0 auto;  /* Center the image within the grid cell */
        }

        /* Other existing styles */
        .container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            margin: 20px 0;
        }

        .channel-name {
            font-size: 20px;
            color: #e50914;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .player-container {
            width: 100%;
            max-width: 1200px;
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .url-buttons {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .url-buttons button {
            background-color: #e50914;
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .url-buttons button:hover {
            background-color: #b20710;
        }

        .url-buttons button:focus {
            outline: none;
        }

    </style>
</head>
<body>

    <!-- MSTV NETWORK Title -->
    <div class="title">MSTV NETWORK</div>

    <!-- Copyright Statement -->
    <div class="copyright">&copy; 2025 MSTV Network. All rights reserved.</div>

    <!-- Scrolling Text -->
    <div class="scrolling-text">
        <span>Stay tuned for more updates and broadcasts! Follow us on social media for the latest news.</span>
    </div>

    <!-- Facebook Icon and Text -->
    <div class="facebook-container">
        <a href="https://www.facebook.com/profile.php?id=61557134556102&mibextid=ZbWKwL" target="_blank">
            <i class="fab fa-facebook-square facebook-icon"></i>
        </a>
        <span class="facebook-text">Click on to find out more</span>
    </div>

    <div class="container">
        <!-- Image Grid Section -->
        <div class="image-grid">
            <img src="https://github.com/your-username/your-repository-name/blob/main/images/myimage.jpg?raw=true" alt="Uploaded Image">
            <!-- You can add more images here if needed -->
        </div>

        <!-- Channel Name and Player Section -->
        <div class="channel-name"></div>

        <div class="player-container" id="player-container">
            <iframe id="media-player" src="https://player.twitch.tv/?channel=aiodigital&parent=mstvnetwork.github.io" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" sandbox="allow-scripts allow-same-origin" allowfullscreen></iframe>
        </div>

        <div class="url-buttons">
            <button onclick="loadPlayer('https://player.twitch.tv/?channel=aiodigital&parent=mstvnetwork.github.io')">MSTV INDIA CHANNEL 1</button>
        </div>
    </div>

    <script>
        // Function to load the appropriate media player source
        function loadPlayer(url) {
            var iframe = document.getElementById('media-player');
            iframe.src = '';
            setTimeout(function() {
                iframe.src = url;
            }, 500);  // Slight delay to ensure iframe reloads properly
        }
    </script>

</body>
</html>
