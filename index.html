<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish Media Player</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #222;
            color: white;
        }

        header {
            text-align: center;
            margin: 20px 0;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff6347; /* Stylish title color */
            text-shadow: 2px 2px 5px rgba(255, 99, 71, 0.8); /* Subtle shadow for effect */
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            justify-items: center;
        }

        .media-player iframe, .media-player video {
            width: 100%;
            height: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease-in-out;
        }

        .media-player iframe:hover, .media-player video:hover {
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #333;
            color: #fff;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Stylish Media Player</h1>
    </header>

    <div class="container">
        <!-- Example for YouTube Embed -->
        <div class="media-player" id="player-1">
            <iframe src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <!-- Example for Twitch Embed -->
        <div class="media-player" id="player-2">
            <iframe src="https://player.twitch.tv/?channel=aiodigital&parent=mstvnetwork.github.io" frameborder="0" allowfullscreen></iframe>
        </div>

        <!-- Example for MP4 Embed -->
        <div class="media-player" id="player-3">
            <video controls>
                <source src="your-video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <!-- Example for M3U8 Embed -->
        <div class="media-player" id="player-4">
            <video controls>
                <source src="your-video.m3u8" type="application/x-mpegURL">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <footer>
        <p>Media Player Site - All Rights Reserved</p>
    </footer>

    <script>
        // Example JavaScript for handling iframe player functionality
        document.querySelectorAll('.media-player iframe').forEach((iframe) => {
            // Disable redirection from embedded media
            iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms');
            iframe.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                // Handle other functionality like autoplay or fullscreen
            });
        });

        // Example for Twitch embed with fullscreen functionality
        document.querySelectorAll('iframe[src*="twitch"]').forEach((iframe) => {
            iframe.setAttribute('allowfullscreen', 'true');
        });
    </script>

</body>
</html>
