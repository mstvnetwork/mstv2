<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>MSTV NETWORK</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Roboto', sans-serif;
            background-color: #111;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        .title {
            font-size: 35px;
            font-weight: bold;
            color: #ff4e00;
            margin: 20px 0;
        }

        .player-container {
            width: 100%;
            max-width: 1200px;
            height: 60vh;
            background-color: #000;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .channel-selection {
            margin-bottom: 20px;
        }

        .channel-selection select {
            padding: 12px;
            font-size: 18px;
            background-color: #222;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        .url-buttons {
            margin-top: 20px;
        }

        .url-buttons button {
            background-color: #ff4e00;
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">MSTV NETWORK</div>

        <div class="channel-selection">
            <select id="channel-select" onchange="changeChannel()">
                <!-- Add channels here -->
                <option value="https://player.twitch.tv/?channel=aiodigital&parent=mstvnetwork.github.io&autoplay=true" data-type="iframe">MSTV INDIA CHANNEL 1</option>
                <option value="https://stream.ads.ottera.tv/playlist.m3u8?network_id=6640" data-type="hls">ZEE BOLLYWORLD</option>
                <option value="https://www.youtube.com/embed/zyp7Fq0SEb4?si=lLGnTcWlv_ZA_7er" data-type="youtube">YouTube Example</option>
                <option value="https://web-ndtv24x7-us.akamaized.net/hls/live/2109282/ndtv24x7us/master.m3u8" data-type="hls">NEW CHANNEL 1</option>
                <option value="https://web-ndtv24x7-us.akamaized.net/hls/live/2109282/ndtv24x7us/master.m3u8" data-type="hls">NEW CHANNEL 2</option>
                  <option value="https://web-ndtv24x7-us.akamaized.net/hls/live/2109282/ndtv24x7us/master.m3u8" data-type="hls">NEW CHANNEL3</option>
                    <option value="https://web-ndtv24x7-us.akamaized.net/hls/live/2109282/ndtv24x7us/master.m3u8" data-type="hls">NEW CHANNEL 4</option>
            </select>
        </div>

        <div class="player-container">
            <video id="media-player" controls autoplay style="display: none;"></video>
            <iframe id="iframe-player" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; fullscreen" 
                sandbox="allow-scripts allow-same-origin allow-presentation" style="display: none;" allowfullscreen>
            </iframe>
        </div>

        <div class="url-buttons">
            <button onclick="changeChannel()">Refresh Player</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        function changeChannel() {
            const select = document.getElementById("channel-select");
            const url = select.value;
            const type = select.options[select.selectedIndex].getAttribute("data-type");

            const videoPlayer = document.getElementById("media-player");
            const iframePlayer = document.getElementById("iframe-player");

            // Hide both players initially
            videoPlayer.style.display = "none";
            iframePlayer.style.display = "none";

            // Stop iframe from playing by resetting its source
            iframePlayer.src = "";

            // Clear any previous HLS instance
            if (window.hlsInstance) {
                window.hlsInstance.destroy();
            }

            if (type === "hls") {
                // Use HLS.js for .m3u8 files
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(videoPlayer);
                    window.hlsInstance = hls;
                } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                    // Native HLS support (e.g., Safari)
                    videoPlayer.src = url;
                } else {
                    alert('Your browser does not support HLS playback.');
                }
                videoPlayer.style.display = "block";
            } else if (type === "iframe") {
                // Use iframe for embedded links
                iframePlayer.src = url;
                iframePlayer.style.display = "block";
            } else if (type === "youtube") {
                // Handle YouTube links using iframe embed URLs
                iframePlayer.src = url;
                iframePlayer.style.display = "block";
            } else {
                alert("Unsupported channel type.");
            }
        }

        // Load the first channel by default
        document.addEventListener("DOMContentLoaded", changeChannel);
    </script>
</body>
</html>
