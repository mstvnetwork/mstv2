<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Update</title>
</head>
<body>
  <h1>Welcome to My GitHub Page!</h1>
  <p id="updateMessage">Loading...</p>

  <!-- JavaScript to check for updates and refresh -->
  <script>
    // Function to check for updates every 5 minutes (300000 milliseconds)
    setInterval(function() {
      fetch(location.href)
        .then(response => response.text())
        .then(html => {
          // To check if the page's content has changed, we can compare specific elements
          // instead of the entire body content, which can be problematic.
          const currentContent = document.body.innerHTML;  // Current HTML content
          const newContent = html;  // Fetched HTML content

          // Debugging the content comparison
          console.log('Current content:', currentContent);
          console.log('Fetched content:', newContent);

          // If the content has changed (or you can refine this logic further)
          if (currentContent !== newContent) {
            document.getElementById("updateMessage").textContent = "New updates detected! Refreshing...";
            location.reload();  // Refresh the page
          }
        })
        .catch(err => {
          console.log('Error checking for updates:', err);
        });
    }, 300000); // Check for updates every 5 minutes
  </script>
</body>
</html>
