<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        select, button {
            padding: 10px;
            font-size: 16px;
            margin: 10px;
        }
        #media-container {
            width: 80%;
            height: 400px;
            margin: 20px auto;
            border: 1px solid #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        video {
            width: 100%;
            height: 100%;
        }
    </style>
    <!-- Include HLS.js library for m3u8 support -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.5/dist/hls.min.js"></script>
</head>
<body>

    <h1>Select Media Format to Embed</h1>

    <select id="media-selector">
        <option value="iframe">Iframe</option>
        <option value="m3u8">M3U8</option>
        <option value="mp4">MP4</option>
    </select>

    <div id="media-container">
        <!-- The media content will be dynamically embedded here -->
    </div>

    <script>
        // URLs for different formats
        const urls = {
            iframe: "https://enz.gdplayertv.to/embed/colors-hindi-my/",
            m3u8: "https://feeds.intoday.in/aajtak/api/aajtakhd/master.m3u8",
            mp4: "https://s3.krakenfiles.com/video/uploads/31-12-2024/KkRTzsZVxt/file.mp4?md5=dcLIGjFn2qcKzLsI0g4Kxg&expires=1735790872"
        };

        // Get references to the HTML elements
        const mediaContainer = document.getElementById('media-container');
        const mediaSelector = document.getElementById('media-selector');

        // Function to update the media content based on the selected option
        function updateMedia() {
            const selectedOption = mediaSelector.value;
            const selectedUrl = urls[selectedOption];

            // Clear the current media content
            mediaContainer.innerHTML = '';

            // Embed media based on selection
            if (selectedOption === 'iframe') {
                const iframe = document.createElement('iframe');
                iframe.src = selectedUrl;
                iframe.frameBorder = '0';
                iframe.allowfullscreen = true;
                mediaContainer.appendChild(iframe);
            } else if (selectedOption === 'm3u8') {
                // Use HLS.js to play m3u8 stream
                const video = document.createElement('video');
                video.controls = true;
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(selectedUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function () {
                        video.play();
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = selectedUrl;
                    video.addEventListener('loadedmetadata', function () {
                        video.play();
                    });
                }
                mediaContainer.appendChild(video);
            } else if (selectedOption === 'mp4') {
                const video = document.createElement('video');
                video.controls = true;
                video.autoplay = true;
                video.muted = true; // To autoplay without requiring user interaction
                const source = document.createElement('source');
                source.src = selectedUrl;
                source.type = "video/mp4";
                video.appendChild(source);
                mediaContainer.appendChild(video);
            }
        }

        // Update media when the user selects a new option
        mediaSelector.addEventListener('change', updateMedia);

        // Initialize the page with the default media type (iframe)
        updateMedia();
    </script>

</body>
</html>
