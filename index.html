<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>MSTV NETWORK</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        /* Your existing styles here */
    </style>
</head>
<body>
    <div class="channel-selection">
        <i class="fas fa-tv"></i>
        <select id="channel-select" onchange="changeChannel()">
            <option value="https://player.twitch.tv/?channel=aiodigital&parent=mstvnetwork.github.io">MSTV INDIA CHANNEL 1</option>
            <option value="https://stream.ads.ottera.tv/playlist.m3u8?network_id=6640" data-type="hls">ZEE BOLLYWORLD</option>
            <option value="https://enz.gdplayertv.to/embed/zee-cinema-tv/">ZEE CINEMA</option>
            <option value="https://enz.gdplayertv.to/embed/colors-hindi-my/">COLORS TV</option>
        </select>
    </div>

    <div class="player-container" id="player-container">
        <video id="media-player" controls autoplay style="width: 100%; height: 100%;"></video>
    </div>

    <div class="url-buttons">
        <button onclick="changeChannel()">Refresh Player</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        function changeChannel() {
            const select = document.getElementById("channel-select");
            const url = select.value;
            const isHls = select.options[select.selectedIndex].getAttribute("data-type") === "hls";

            const video = document.getElementById("media-player");

            // If HLS, use HLS.js to load the stream
            if (isHls && Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
            } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
                // Native HLS support (e.g., Safari)
                video.src = url;
            } else {
                // Non-HLS streams (like iframe sources)
                video.style.display = "none"; // Hide the video player
                const playerContainer = document.getElementById("player-container");
                playerContainer.innerHTML = `<iframe id="media-player" src="${url}" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; fullscreen" sandbox="allow-scripts allow-same-origin allow-presentation" allowfullscreen></iframe>`;
            }
        }

        // Load the first channel by default
        document.addEventListener("DOMContentLoaded", changeChannel);
    </script>
</body>
</html>
