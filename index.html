<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV INDIA</title>
    <style>
        /* Your existing styles go here */
        .channel-selector img {
            width: 30px;
            height: 30px;
            margin-right: 10px;
        }

        @media (max-width: 768px) {
            iframe, video {
                height: 250px;
            }

            .channel-selector select {
                width: 90%;
            }
        }

        /* Style to hide iframe by default */
        .hidden-iframe {
            display: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<header>
    <h1>MSTV INDIA</h1>
    <p class="slogan">PLEASE FOLLOW THE INSTRUCTIONS BELOW</p>
    <p class="slogan">PLEASE SELECT CHANNEL, WAIT FOR CHANNEL TO LOAD</p>
    <p class="slogan">REFRESH THE WEBPAGE COUPLE OF TIMES TO WATCH NEWLY ADDED CHANNELS</p>
    <p>&copy; 2025 MSTV INDIA</p>
</header>

<div class="content">
    <h2></h2>
    <div class="channel-selector">
        <img src="https://raw.githubusercontent.com/mstvnetwork/mstv/main/remote.png" alt="Channel Icon">
        <select id="channelSelect" onchange="loadChannel()">
            <option value="0.00">NBC SPORT</option>
            <option value="6">COLORS CHANNEL USA</option>
            
            
            <!-- Channel options will be dynamically updated by SSE -->
        </select>
    </div>

  <!-- JavaScript to check for updates and refresh -->
  <script>
    // Function to check for updates every 5 minutes (300000 milliseconds)
    setInterval(function() {
      fetch(location.href)
        .then(response => response.text())
        .then(html => {
          // To check if the page's content has changed, we can compare specific elements
          // instead of the entire body content, which can be problematic.
          const currentContent = document.body.innerHTML;  // Current HTML content
          const newContent = html;  // Fetched HTML content

          // Debugging the content comparison
          console.log('Current content:', currentContent);
          console.log('Fetched content:', newContent);

          // If the content has changed (or you can refine this logic further)
          if (currentContent !== newContent) {
            document.getElementById("updateMessage").textContent = "New updates detected! Refreshing...";
            location.reload();  // Refresh the page
          }
        })
        .catch(err => {
          console.log('Error checking for updates:', err);
        });
    }, 300000); // Check for updates every 5 minutes
  </script>
</body>
</html>
