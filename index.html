<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTV NETWORK</title>
    <style>
        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body Styles */
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            text-align: center;
        }

        /* Page Title Style */
        .page-title {
            color: white;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3), 0 0 25px rgba(255, 255, 255, 0.4);
            margin-bottom: 20px;
        }

        /* Subtitle or Copyright Statement Style */
        .copyright {
            color: white;
            font-size: 1rem;
            margin-top: 10px;
            text-align: center;
        }

        /* Title Animation */
        h1 {
            animation: fadeIn 3s ease-in-out;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* Media Container */
        .media-container {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            padding: 20px;
            text-align: center;
            width: 100%;
            max-width: 600px; /* Maximum width for responsiveness */
            z-index: 10;
            position: relative;
        }

        /* Button Style */
        .play-btn {
            background-color: #ff7e5f;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            margin: 10px;
        }

        .play-btn:hover {
            background-color: #feb47b;
            transform: scale(1.1);
        }

        .play-btn:active {
            transform: scale(1);
        }

        /* Media Player Styling */
        iframe, video {
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }

        /* Fullscreen button styles for MSTV CHANNEL 1 */
        iframe {
            transition: transform 0.3s ease;
        }

        /* Extra for responsive adjustments */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem; /* Smaller title on mobile */
            }
            .play-btn {
                font-size: 1rem; /* Adjust button size on mobile */
            }
        }

        /* Reset Button */
        .reset-btn {
            background-color: #feb47b;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
        }

        .reset-btn:hover {
            background-color: #ff7e5f;
            transform: scale(1.1);
        }

        .reset-btn:active {
            transform: scale(1);
        }
    </style>
</head>
<body>
    <!-- Page Title at the top -->
    <div class="page-title">
        MSTV NETWORK
    </div>

    <h1>Welcome to the Stylish Media Page</h1>

    <div class="media-container">
        <!-- Play Buttons -->
        <button class="play-btn" onclick="playMedia('DESI PLAY TV')">Play DESI PLAY TV</button>
        <button class="play-btn" onclick="playMedia('MSTV CHANNEL 1')">Play MSTV CHANNEL 1</button>
        <div id="media-player" style="display:none;">
            <!-- Placeholder for media content -->
        </div>
    </div>

    <!-- Copyright Statement at the bottom -->
    <div class="copyright">
        &copy; 2025 MSTV NETWORK. All rights reserved.
    </div>

    <!-- Include Hls.js library -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        function playMedia(channelName) {
            // Get the media player container
            const mediaPlayer = document.getElementById('media-player');
            
            // Clear previous media content
            mediaPlayer.innerHTML = '';
            
            // Show the media player container
            mediaPlayer.style.display = 'block';

            // Set URLs based on selected channel
            let mediaUrl = '';
            let mediaType = '';

            if (channelName === 'MSTV CHANNEL 1') {
                // MSTV CHANNEL 1 - Twitch iframe URL
                mediaUrl = "https://player.twitch.tv/?channel=aiodigital&parent=mstvnetwork.github.io";
                mediaType = "iframe";
            } else if (channelName === 'DESI PLAY TV') {
                // DESI PLAY TV - M3U8 stream URL
                mediaUrl = "https://desiplaylive.akamaized.net/ptnr-yupptv/v1/manifest/611d79b11b77e2f571934fd80ca1413453772ac7/vglive-sk-660691/4cf68f50-0c5e-47a6-96e3-b78797a2b6fe/1.m3u8";
                mediaType = "m3u8";
            }

            // Show the appropriate media type
            if (mediaType === "iframe") {
                const iframe = document.createElement("iframe");
                iframe.src = mediaUrl;
                iframe.frameborder = "0";
                iframe.allow = "accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture";
                iframe.allowfullscreen = true;  // Enable full-screen for iframe
                iframe.sandbox = "allow-scripts allow-same-origin";  // Prevent redirect to Twitch website
                mediaPlayer.appendChild(iframe);
            } 
            else if (mediaType === "m3u8") {
                const video = document.createElement("video");
                video.src = mediaUrl;
                video.controls = true;
                video.autoplay = true;
                mediaPlayer.appendChild(video);

                // If HLS.js is supported, use it for M3U8 streams
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(mediaUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function () {
                        video.play();
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // For browsers like Safari that natively support HLS
                    video.src = mediaUrl;
                    video.addEventListener('loadedmetadata', function () {
                        video.play();
                    });
                }
            }
        }
    </script>
</body>
</html>
